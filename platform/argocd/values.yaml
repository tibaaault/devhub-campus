# Values Helm pour installer ArgoCD lui-même (chart argo/argo-cd).
# Ce fichier est consommé par `make argocd-install`.
#
# Doc du chart : https://github.com/argoproj/argo-helm/tree/main/charts/argo-cd
#
# Le but de ce fichier : exposer l'UI via l'ingress-nginx du cluster,
# avec un host `argocd.devhub.local`. Le reste est laissé par défaut.

global:
  domain: argocd.devhub.local

configs:
  params:
    server.insecure: true
  cm:
    # On active un compte local nommé "thibault" (ou ce que tu veux)
    accounts.thibault: login
  
  rbac:
    # La politique de droits (Policy)
    policy.csv: |
      # Le rôle platform-admin a tous les droits (*)
      p, role:platform-admin, applications, *, */*, allow
      p, role:platform-admin, clusters, *, *, allow
      p, role:platform-admin, projects, *, *, allow
      p, role:platform-admin, repositories, *, *, allow

      # Le rôle developer peut "get" (voir) les applications du projet devhub
      p, role:developer, applications, get, devhub/*, allow
      # Le rôle developer peut "sync" UNIQUEMENT les apps qui contiennent "annuaire" (grâce au joker *)
      p, role:developer, applications, sync, devhub/*annuaire*, allow

      # On assigne les rôles aux utilisateurs
      g, admin, role:platform-admin
      g, thibault, role:developer

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.devhub.local
    annotations:
      # ArgoCD termine son propre TLS en interne. On dit à l'ingress
      # de ne pas refaire de TLS terminaison côté server.
      nginx.ingress.kubernetes.io/backend-protocol: HTTP
    tls: false

# TODO étape 9 (défi) : activer la sous-chart notifications et
# brancher un webhook qui envoie un message à chaque sync échouée.
# notifications:
#   enabled: true
#   ...

# Garde-fou ressources — utile en TP pour ne pas saturer la machine.
controller:
  resources:
    requests: { cpu: "50m", memory: "256Mi" }
    limits:   { cpu: "1",   memory: "1Gi" }

repoServer:
  resources:
    requests: { cpu: "50m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }

notifications:
  enabled: true
  notifiers:
    webhook.my-webhook: |
      url: https://webhook.site/69e5ed9d-6f89-4043-9471-51bf6636f910
      headers:
      - name: Content-Type
        value: application/json
  templates:
    template.webhook-sync-failed: |
      webhook:
        my-webhook:
          method: POST
          body: |
            {
              "app": "{{.app.metadata.name}}",
              "revision": "{{.app.status.sync.revision}}",
              "error": "{{.app.status.operationState.message}}"
            }
  triggers:
    trigger.on-sync-failed: |
      - description: Application syncing has failed
        send:
        - webhook-sync-failed
        when: app.status.operationState != nil and app.status.operationState.phase in ['Error', 'Failed']